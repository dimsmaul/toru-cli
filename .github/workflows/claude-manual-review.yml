name: Claude Manual Review

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to review'
        required: true
        type: string
      prompt:
        description: 'Review instruction for Claude'
        required: false
        default: 'Review the codebase. Focus on code quality, security, and best practices.'
        type: string
      review_run_id:
        description: 'Internal review_run UUID from the code-review service'
        required: false
        type: string
      review_type_label:
        description: 'Display label for the review type (e.g. Quality Gate, Security Review)'
        required: false
        default: 'Manual Review'
        type: string

jobs:
  review:
    runs-on: self-hosted
    environment: claude-code
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 20

      - name: Inject Dynamic Framework Skill
        run: |
          FRAMEWORK="generic"
          if [ -f pubspec.yaml ]; then
            FRAMEWORK="flutter"
          elif [ -f go.mod ]; then
            FRAMEWORK="golang"
          elif [ -f package.json ]; then
            if grep -q '"react-native"' package.json 2>/dev/null || grep -q "'react-native'" package.json 2>/dev/null; then
              FRAMEWORK="react-native"
            elif grep -q '"react"' package.json 2>/dev/null || grep -q "'react'" package.json 2>/dev/null; then
              FRAMEWORK="react"
            else
              FRAMEWORK="node"
            fi
          elif find . -maxdepth 3 -name "*.kt" -print -quit | grep -q .; then
            FRAMEWORK="kotlin"
          elif find . -maxdepth 3 -name "*.swift" -print -quit | grep -q .; then
            FRAMEWORK="ios-swift"
          fi
          echo "Detected framework: $FRAMEWORK"

          SYSTEM_PROMPT=""

          CAVEMAN=$(curl -sf "http://localhost:8080/skills/caveman/SKILL.md" 2>/dev/null) || true
          if [ -n "$CAVEMAN" ]; then
            echo "Caveman rules fetched"
            SYSTEM_PROMPT="$CAVEMAN"
          fi

          FRAMEWORK_SKILL=$(curl -sf "http://localhost:8080/api/dynamic-skill?framework=$FRAMEWORK" 2>/dev/null) || true
          if [ -n "$FRAMEWORK_SKILL" ]; then
            echo "Framework skill fetched for: $FRAMEWORK"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${FRAMEWORK_SKILL}"
          else
            echo "No framework skill available for $FRAMEWORK, skipping"
          fi

          LAPORAN=$(curl -sf "http://localhost:8080/skills/laporan/SKILL.md" 2>/dev/null) || true
          if [ -n "$LAPORAN" ]; then
            echo "Laporan rules fetched"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${LAPORAN}"
          fi

          if [ -n "$SYSTEM_PROMPT" ]; then
            echo "APPEND_SYSTEM_PROMPT<<EOF" >> $GITHUB_ENV
            echo "$SYSTEM_PROMPT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "APPEND_SYSTEM_PROMPT set"
          fi

      - name: Run Claude Review
        id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ${{ inputs.prompt }}

            After completing the review, create a GitHub issue in this repository using the `gh` CLI.
            Issue title: "[Claude Review] ${{ inputs.branch }} - ${{ inputs.review_type_label }}"
            Label the issue with "claude-review" (create the label first if it doesn't exist: `gh label create claude-review --color 0E8A16 --description "Automated Claude review report" 2>/dev/null || true`).
            The issue body must be a single consolidated report in markdown format.
          claude_args: '--allowed-tools "Glob,Grep,LS,Read,Bash"'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          APPEND_SYSTEM_PROMPT: ${{ env.APPEND_SYSTEM_PROMPT }}

      - name: Resolve issue metadata
        id: issue_meta
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          # claude-code-action creates a GitHub issue for workflow_dispatch
          # reviews (no PR context = no PR comment). We capture the issue
          # NUMBER (small int from URL like /issues/8 → 8) so BE can fetch
          # the body via /repos/{owner}/{repo}/issues/{number}.
          ISSUE_URL=$(gh issue list --label "claude-review" --state open --json url,title \
            --jq '[.[] | select(.title | startswith("[Claude Review] ${{ inputs.branch }} - ${{ inputs.review_type_label }}"))] | first | .url' 2>/dev/null || true)

          ISSUE_NUMBER=""
          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          fi

          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          echo "issue_url=${ISSUE_URL}" >> $GITHUB_OUTPUT

      - name: Notify Completion
        if: always()
        env:
          CLAUDE_DONE_SECRET: ${{ secrets.CLAUDE_DONE_SECRET }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set +e
          ISSUE_NUMBER="${{ steps.issue_meta.outputs.issue_number }}"
          ISSUE_URL="${{ steps.issue_meta.outputs.issue_url }}"
          REVIEW_RUN_ID="${{ inputs.review_run_id }}"

          # Extract verdict from the issue body Claude posted. Looks for the
          # mandatory "Verdict: <value>" line (case-insensitive). Falls back
          # to empty string — BE will default to "approve" if empty, but we
          # want the real verdict for "request changes" / "needs work".
          VERDICT=""
          if [ -n "$ISSUE_NUMBER" ]; then
            BODY=$(gh api "repos/${{ github.repository }}/issues/$ISSUE_NUMBER" --jq '.body' 2>/dev/null || true)
            VERDICT_RAW=$(printf '%s' "$BODY" | grep -iE '^Verdict:' | head -1 | sed -E 's/^[Vv]erdict:[[:space:]]*//' | tr -d '\r')
            VERDICT_LOWER=$(printf '%s' "$VERDICT_RAW" | tr '[:upper:]' '[:lower:]' | xargs)
            case "$VERDICT_LOWER" in
              approve|"can merge"|lgtm) VERDICT="approve" ;;
              "needs work"|"needs_work"|needs*work*) VERDICT="needs_work" ;;
              "request change"|"request changes"|change_request|request*change*) VERDICT="change_request" ;;
            esac
            echo "extracted verdict raw='$VERDICT_RAW' normalized='$VERDICT'"
          fi

          # Capture commits inline. Use tab separator (git strips tabs from
          # subject lines). Default to [] if git/jq fail (missing on runner,
          # detached checkout, etc.) so payload always parses.
          COMMITS_TSV=$(git log -5 --pretty=format:'%h%x09%s%x09%an' 2>/dev/null || true)
          if [ -z "$COMMITS_TSV" ]; then
            COMMITS_JSON="[]"
          else
            COMMITS_JSON=$(printf '%s' "$COMMITS_TSV" \
              | jq -Rn '[inputs | split("\t") | select(length >= 3) | {sha: .[0], message: .[1], author: .[2]}]' 2>/dev/null \
              || echo '[]')
            if [ -z "$COMMITS_JSON" ]; then COMMITS_JSON="[]"; fi
          fi
          echo "commits payload: $COMMITS_JSON"

          jq -n \
            --arg review_run_id "$REVIEW_RUN_ID" \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ inputs.branch }}" \
            --arg status "${{ job.status }}" \
            --arg verdict "$VERDICT" \
            --argjson run_id ${{ github.run_id }} \
            --argjson build_number ${{ github.run_number }} \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_url "$ISSUE_URL" \
            --argjson commits "$COMMITS_JSON" \
            '{
              review_run_id: $review_run_id,
              repo: $repo,
              branch: $branch,
              status: $status,
              verdict: $verdict,
              run_id: $run_id,
              build_number: $build_number,
              commits: $commits,
              pr_number: ($issue_number | if . == "" then null else tonumber end),
              pr_comment_url: ($issue_url | if . == "" then null else . end)
            }' > /tmp/payload.json

          cat /tmp/payload.json

          curl -sf -X POST "http://localhost:8080/webhook/manual-review-done" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLAUDE_DONE_SECRET" \
            -d @/tmp/payload.json
