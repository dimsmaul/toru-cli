name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude review once') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude review once') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude review once') &&
        (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER' || github.event.review.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude review once') || contains(github.event.issue.title, '@claude review once')) &&
        (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR')
      )
    runs-on: self-hosted
    environment: claude-code
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Inject Dynamic Framework Skill
        run: |
          # Detect framework from checked-out repo (local file check)
          FRAMEWORK="generic"
          if [ -f pubspec.yaml ]; then
            FRAMEWORK="flutter"
          elif [ -f go.mod ]; then
            FRAMEWORK="golang"
          elif [ -f package.json ]; then
            if grep -q '"react-native"' package.json 2>/dev/null || grep -q "'react-native'" package.json 2>/dev/null; then
              FRAMEWORK="react-native"
            elif grep -q '"react"' package.json 2>/dev/null || grep -q "'react'" package.json 2>/dev/null; then
              FRAMEWORK="react"
            else
              FRAMEWORK="node"
            fi
          elif find . -maxdepth 3 -name "*.kt" -print -quit | grep -q .; then
            FRAMEWORK="kotlin"
          elif find . -maxdepth 3 -name "*.swift" -print -quit | grep -q .; then
            FRAMEWORK="ios-swift"
          fi
          echo "Detected framework: $FRAMEWORK"

          SYSTEM_PROMPT=""

          # Fetch caveman rules from backend
          CAVEMAN=$(curl -sf "https://promising-corner-durable-steel.trycloudflare.com/skills/caveman/SKILL.md" 2>/dev/null) || true
          if [ -n "$CAVEMAN" ]; then
            echo "Caveman rules fetched"
            SYSTEM_PROMPT="$CAVEMAN"
          fi

          # Fetch framework skill from backend
          FRAMEWORK_SKILL=$(curl -sf "https://promising-corner-durable-steel.trycloudflare.com/api/dynamic-skill?framework=$FRAMEWORK" 2>/dev/null) || true
          if [ -n "$FRAMEWORK_SKILL" ]; then
            echo "Framework skill fetched for: $FRAMEWORK"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${FRAMEWORK_SKILL}"
          else
            echo "No framework skill available for $FRAMEWORK, skipping"
          fi

          # Fetch laporan rules from backend
          LAPORAN=$(curl -sf "https://promising-corner-durable-steel.trycloudflare.com/skills/laporan/SKILL.md" 2>/dev/null) || true
          if [ -n "$LAPORAN" ]; then
            echo "Laporan rules fetched"
            SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"${LAPORAN}"
          fi

          # Per-project context: .review/context/*.md from the checked-out repo, appended
          # AFTER the global skills so a project can extend/override. Sorted alphabetically,
          # capped at 256KB total.
          if [ -d .review/context ]; then
            PROJECT_CTX=""
            for f in $(ls .review/context/*.md 2>/dev/null | sort); do
              PROJECT_CTX="${PROJECT_CTX}"$'\n\n'"$(cat "$f")"
            done
            PROJECT_CTX=$(printf '%s' "$PROJECT_CTX" | head -c 262144)
            if [ -n "$PROJECT_CTX" ]; then
              echo "Project context (.review/context) loaded"
              SYSTEM_PROMPT="${SYSTEM_PROMPT}"$'\n\n'"# Project context (.review/context)"$'\n'"${PROJECT_CTX}"
            fi
          fi

          # Write combined content to APPEND_SYSTEM_PROMPT
          if [ -n "$SYSTEM_PROMPT" ]; then
            echo "APPEND_SYSTEM_PROMPT<<EOF" >> $GITHUB_ENV
            echo "$SYSTEM_PROMPT" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            echo "APPEND_SYSTEM_PROMPT set"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Auto-review prompt for pull_request events (no comment body available).
          # For issue_comment events, the comment body is used as prompt automatically.
          prompt: ${{ github.event_name == 'pull_request' && '@claude review once' || '' }}

          # Use sticky comment so review output is posted as a PR comment.
          # Without this, pull_request-triggered reviews have no parent comment
          # to reply to and the review output is lost.
          use_sticky_comment: true

          # Enable full output for debugging review issues.
          show_full_output: true

          # Optional: Add claude_args to customize behavior and configuration
          # We MUST include the default MCP tools (Read, Glob, LS, mcp__github_comment...)
          # otherwise they get overridden and Claude cannot post the review comment.
          claude_args: '--model claude-opus-4-6 --allowed-tools "Glob,Grep,LS,Read,mcp__github_comment__update_claude_comment,mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Bash"'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          APPEND_SYSTEM_PROMPT: ${{ env.APPEND_SYSTEM_PROMPT }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SECURITY_API_TOKEN: ${{ secrets.SECURITY_API_TOKEN }}

      - name: Post-Review Actions (Discord Notify)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          CLAUDE_DONE_SECRET: ${{ secrets.CLAUDE_DONE_SECRET }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "0" ]; then
            echo "No PR number found, skipping post-review actions"
            exit 0
          fi

          # Notify PR service → triggers Discord notification (service handles draft→ready based on verdict)
          JOB_STATUS="${{ job.status }}"
          echo "Notifying PR service... (status=$JOB_STATUS)"
          curl -sf -X POST "https://promising-corner-durable-steel.trycloudflare.com/webhook/claude-done" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLAUDE_DONE_SECRET" \
            -d "{\"repo\":\"$REPO\",\"pr\":$PR_NUMBER,\"status\":\"$JOB_STATUS\"}" \
            && echo "Service notified successfully" \
            || echo "Service notification failed (non-fatal)"

